<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDK MPC Test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #111; color: #eee; }
    #status { margin-top: 1rem; padding: 1rem; border: 1px solid #444; border-radius: 0.5rem; white-space: pre-wrap; }
    .ok { color: #2e7d32; }
    .err { color: #c62828; }
  </style>
</head>
<body>
  <h1>SDK MPC Test</h1>
  <p>Call <code>window.testSdkMpc({ jwt, sub })</code> from the console or automation.</p>
  <div id="status">Loading SDK...</div>
  <script type="module">
    import { fetchWalletJwt, createMpcWalletFromJwt } from './sdk-test/dist/assets/index-DA1HoU6d.js';
    const status = document.getElementById('status');
    window.testSdkMpc = async ({ jwt, sub }) => {
      try {
        const wallet = await createMpcWalletFromJwt({
          clientId: 'BFb9PwlIn0cgDq0dNSLgw9vsIVAqZ-XiUkACB5_Rktla5N6J9oJ1UeeSOILLSaAGJPYUMChG0DwP7RAzd3ZXhZA',
          verifier: 'new-localchimera',
          verifierId: sub,
          idToken: jwt,
        });
        status.innerHTML = '<span class="ok">SDK MPC wallet created.</span>\nAddress: ' + wallet.address;
        return { success: true, address: wallet.address };
      } catch (e) {
        status.innerHTML = '<span class="err">Error: ' + (e.message || String(e)) + '</span>';
        return { success: false, error: e.message || String(e) };
      }
    };
    status.textContent = 'SDK loaded. Ready.';
  </script>
</body>
</html>
