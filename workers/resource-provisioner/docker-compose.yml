version: '3.8'

services:
  resource-provisioner:
    build: .
    container_name: chimera-resource-provisioner
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    networks:
      - chimera

  mysterium-tunnel:
    image: mysteriumnetwork/myst:latest
    container_name: chimera-mysterium
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - MYSTERIUM_API_URL=http://localhost:4050
    networks:
      - chimera

  btfs-node:
    image: bittorrent/btfs:latest
    container_name: chimera-btfs
    restart: unless-stopped
    volumes:
      - btfs-data:/data/btfs
    environment:
      - BTFS_API_URL=http://localhost:5001
    networks:
      - chimera

  streamr-node:
    image: streamr/broker-node:latest
    container_name: chimera-streamr
    restart: unless-stopped
    env_file: .env
    ports:
      - "32200:32200"
    volumes:
      - streamr-data:/root/.streamr
    networks:
      - chimera

networks:
  chimera:
    driver: bridge

volumes:
  btfs-data:
  streamr-data:
