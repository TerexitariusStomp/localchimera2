# config/local.testnet.yaml
# Self-hosted FHEVM relayer targeting Zama Testnet
# Copy this file to upstream/fhevm/relayer/config/local.testnet.yaml
# and fill in the private key either here or via the APP_GATEWAY__TX_ENGINE__PRIVATE_KEY env var.

host_chains:
  - chain_id: 11155111
    url: "https://sepolia.drpc.org"
    acl_address: "0xf0Ffdc93b7E186bC2f8CB3dAA75D86d1930A433D"

protocol_config:
  ethereum_http_rpc_url: "https://sepolia.drpc.org"
  address: "0xAA1d9D4927A62f842F0DE5AD6b8dFDB074Fa62f2"
  retry:
    max_attempts: 3
    retry_interval_ms: 200

user_decrypt_signature_check:
  erc1271_gas_limit: 100000

gateway:
  blockchain_rpc:
    http_url: "https://rpc.testnet.zama.org/"
    read_http_url: "https://rpc.testnet.zama.org/"
    chain_id: 10901
    ws_health_check_timeout_secs: 5
    http_health_check_timeout_secs: 5
  listener_pool:
    reconnect_config:
      max_attempts: 20
      retry_interval_ms: 500
    polling_max_attempts: 40
    recycle_interval_mins: 30
    poll_interval_ms: 2000
    dedup_ttl_seconds: 5
    dedup_max_capacity: 100000
    listeners:
      - type: subscription
        url: "wss://rpc.testnet.zama.org"
      - type: subscription
        url: "wss://rpc.testnet.zama.org"
  tx_engine:
    signer:
      type: "private_key"
      private_key: ""
    max_concurrency: 100
    retry:
      max_attempts: 100
      retry_interval_ms: 500
    tx_throttlers:
      input_proof:
        per_seconds: 20
        capacity: 11000
        safety_margin: 1000
      user_decrypt:
        per_seconds: 20
        capacity: 11000
        safety_margin: 1000
      public_decrypt:
        per_seconds: 20
        capacity: 11000
        safety_margin: 1000
  readiness_checker:
    host_acl_check:
      retry:
        max_attempts: 3
        retry_interval_ms: 1000
    gw_ciphertext_check:
      retry:
        max_attempts: 75
        retry_interval_ms: 3000
    public_decrypt:
      max_concurrency: 250
      capacity: 11000
      safety_margin: 1000
    user_decrypt:
      max_concurrency: 250
      capacity: 11000
      safety_margin: 1000
  contracts:
    decryption_address: "0x5D8BD78e2ea6bbE41f26dFe9fdaEAa349e077478"
    input_verification_address: "0x483b9dE06E4E4C7D35CCf5837A1668487406D955"
    user_decrypt_shares_threshold: 9
  gw_event_not_found_retry:
    max_retries: 3
    retry_delay_ms: 1000

log:
  format: "pretty"
  show_file_line: false
  show_thread_ids: false
  show_timestamp: true
  show_target: true

keyurl:
  fhe_public_key:
    data_id: "fhe-public-key-data-id"
    url: "https://zama-mpc-testnet-public-efd88e2b.s3.eu-west-1.amazonaws.com/PUB-p1/PublicKey/0400000000000000000000000000000000000000000000000000000000000003"
  crs:
    data_id: "crs-data-id"
    url: "https://zama-mpc-testnet-public-efd88e2b.s3.eu-west-1.amazonaws.com/PUB-p1/CRS/0500000000000000000000000000000000000000000000000000000000000004"

http:
  endpoint: "0.0.0.0:3002"
  metrics:
    histogram_buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]
  api_retry_after_seconds: 4
  enable_admin_endpoint: false
  retry_after:
    min_seconds: 1
    max_seconds: 300
    safety_margin: 0.2
    nominal_times:
      readiness_check_seconds: 4
      input_proof_processing_seconds: 2
      user_decrypt_processing_seconds: 6
      public_decrypt_processing_seconds: 6
      tx_confirmation_ms: 250
    copro_kms_backoff_intervals:
      - [0, 4]
      - [60, 10]
      - [120, 30]
      - [300, 60]
      - [900, 300]

metrics:
  endpoint: "0.0.0.0:9898"
  query_duration_histogram_bucket: [0.001, 0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]
  request_status_duration_histogram_bucket: [0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0, 30.0, 60.0, 300.0, 600.0, 1800.0, 3600.0]
  transaction_duration_secs_histogram_bucket: [0.01, 0.1, 0.25, 0.50, 0.75, 1.0, 1.25, 1.5, 2.0, 5.0, 10.0]
  retry_after_raw_eta_histogram_bucket: [1, 2, 5, 10, 20, 30, 60, 120, 300, 600, 1200, 2400]

storage:
  sql_database_url: "postgresql://postgres:postgres@localhost:5432/relayer_db"
  app_pool:
    max_connections: 10
    min_connections: 2
    acquire_timeout_secs: 10
    idle_timeout_secs: 300
    max_lifetime_secs: 900
  cron_pool:
    max_connections: 5
    min_connections: 1
    acquire_timeout_secs: 30
    idle_timeout_secs: 600
    max_lifetime_secs: 1800
  sql_health_check_timeout_secs: 5
  cron:
    timeout_cron_interval: "60s"
    public_decrypt_timeout: "30m"
    user_decrypt_timeout: "30m"
    input_proof_timeout: "30m"
    expiry_enabled: false
    expiry_cron_interval: "5m"
    public_decrypt_expiry: "365d"
    user_decrypt_expiry: "7d"
    input_proof_expiry: "7d"
    cron_startup_delay_after_recovery: "30s"
