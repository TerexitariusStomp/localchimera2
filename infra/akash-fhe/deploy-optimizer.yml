---
version: "2.0"

services:
  fhe-optimizer:
    image: ghcr.io/${IMAGE_OWNER}/fhe-optimizer:gpu
    credentials:
      host: ghcr.io
      username: ${IMAGE_OWNER}
      password: ${GHCR_TOKEN}
    expose:
      - port: 8080
        as: 80
        to:
          - global: true
    env:
      - FHE_MODEL_NAME=lfm2.5-230m

profiles:
  compute:
    fhe-h100:
      resources:
        cpu:
          units: 32
        memory:
          size: 128Gi
        storage:
          size: 100Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: h100
  placement:
    akash:
      attributes:
        host: akash
      signed_by:
        any_of:
          - ""
      pricing:
        fhe-h100:
          denom: uact
          amount: 10000000

deployment:
  fhe-optimizer:
    akash:
      profile: fhe-h100
      count: 1
