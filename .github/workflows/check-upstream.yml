name: Check Upstream Updates

on:
  schedule:
    - cron: "0 12 * * 1" # Every Monday at noon UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-npm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check outdated (qvac)
        id: qvac
        run: |
          cd qvac
          echo "outdated<<EOF" >> $GITHUB_OUTPUT
          npm outdated 2>/dev/null >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check outdated (qvac/frontend)
        id: frontend
        run: |
          cd qvac/frontend
          echo "outdated<<EOF" >> $GITHUB_OUTPUT
          npm outdated 2>/dev/null >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check outdated (apps/desktop)
        id: desktop
        run: |
          cd apps/desktop
          echo "outdated<<EOF" >> $GITHUB_OUTPUT
          npm outdated 2>/dev/null >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check outdated (sdk)
        id: sdk
        run: |
          cd sdk
          echo "outdated<<EOF" >> $GITHUB_OUTPUT
          npm outdated 2>/dev/null >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Open issue if updates found
        uses: actions/github-script@v7
        with:
          script: |
            const sections = [
              { name: 'qvac', output: '${{ steps.qvac.outputs.outdated }}' },
              { name: 'qvac/frontend', output: '${{ steps.frontend.outputs.outdated }}' },
              { name: 'apps/desktop', output: '${{ steps.desktop.outputs.outdated }}' },
              { name: 'sdk', output: '${{ steps.sdk.outputs.outdated }}' },
            ];

            const hasUpdates = sections.some(s => s.output && s.output.trim() !== '' && s.output.trim() !== 'EOF');
            if (!hasUpdates) {
              console.log('No upstream updates found.');
              return;
            }

            const title = `Upstream dependency updates available — ${new Date().toISOString().slice(0,10)}`;
            let body = '## npm packages with updates available\n\nRun `npm update` in the relevant directories, test, and commit.\n\n';
            for (const s of sections) {
              if (s.output && s.output.trim() && s.output.trim() !== 'EOF') {
                body += `### ${s.name}\n\n\`\`\`\n${s.output.trim()}\n\`\`\`\n\n`;
              }
            }
            body += '---\n';
            body += 'See [docs/UPSTREAM.md](docs/UPSTREAM.md) for update instructions.\n';

  check-github-upstreams:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Check GitHub upstreams
        id: github
        run: |
          echo "checking<<EOF" >> $GITHUB_OUTPUT

          # markitdown
          echo "## microsoft/markitdown" >> $GITHUB_OUTPUT
          curl -s https://api.github.com/repos/microsoft/markitdown/releases/latest | jq -r '"Latest release: \" + (.tag_name // \"none\") + \" \" + (.published_at // \"\")' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          # llmwiki
          echo "## lucasastorian/llmwiki" >> $GITHUB_OUTPUT
          curl -s https://api.github.com/repos/lucasastorian/llmwiki/commits/main | jq -r '.[0] | \"Last commit: \" + (.commit.author.date // \"unknown\") + \" \" + (.commit.message | split(\"\\n\")[0] | .[0:60])\"' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          # repo-to-markdown
          echo "## puter-apps/repo-to-markdown" >> $GITHUB_OUTPUT
          curl -s https://api.github.com/repos/puter-apps/repo-to-markdown/commits/main | jq -r '.[0] | \"Last commit: \" + (.commit.author.date // \"unknown\") + \" \" + (.commit.message | split(\"\\n\")[0] | .[0:60])\"' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          # openviking
          echo "## volcengine/OpenViking" >> $GITHUB_OUTPUT
          curl -s https://api.github.com/repos/volcengine/OpenViking/commits/main | jq -r '.[0] | \"Last commit: \" + (.commit.author.date // \"unknown\") + \" \" + (.commit.message | split(\"\\n\")[0] | .[0:60])\"' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          # otterwiki
          echo "## redimp/otterwiki" >> $GITHUB_OUTPUT
          curl -s https://api.github.com/repos/redimp/otterwiki/commits/main | jq -r '.[0] | \"Last commit: \" + (.commit.author.date // \"unknown\") + \" \" + (.commit.message | split(\"\\n\")[0] | .[0:60])\"' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          # knowledge-catalog / OKF spec
          echo "## GoogleCloudPlatform/knowledge-catalog" >> $GITHUB_OUTPUT
          curl -s https://api.github.com/repos/GoogleCloudPlatform/knowledge-catalog/commits/main | jq -r '.[0] | \"Last commit: \" + (.commit.author.date // \"unknown\") + \" \" + (.commit.message | split(\"\\n\")[0] | .[0:60])\"' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          # Earnidle website (manual check note)
          echo "## earnidle.com" >> $GITHUB_OUTPUT
          echo "Check manually: https://earnidle.com for protocol changes" >> $GITHUB_OUTPUT

          echo "EOF" >> $GITHUB_OUTPUT

      - name: Open issue if updates found
        uses: actions/github-script@v7
        with:
          script: |
            const output = `\n${{ steps.github.outputs.checking }}\n`;
            const title = `Upstream GitHub repos update check — ${new Date().toISOString().slice(0,10)}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream',
              state: 'open',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: existing.data[0].body + '\n\n' + output,
              });
              console.log(`Updated existing issue #${existing.data[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: output,
                labels: ['upstream'],
              });
              console.log(`Created issue #${issue.data.number}`);
            }
