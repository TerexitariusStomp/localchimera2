[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "upstream"]
remappings = [
  "fhevm/=lib/fhevm/",
  "encrypted-types/=lib/encrypted-types/"
]
via_ir = true
optimizer = true
optimizer_runs = 200

# Testnet RPC (update with actual testnet URL)
[rpc_endpoints]
chimera = "${CHIMERA_RPC_URL}"

[etherscan]
chimera = { key = "", url = "" }
