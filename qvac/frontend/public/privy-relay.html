<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chimera Privy Relay</title>
  <style>
    body { margin: 0; padding: 0; background: transparent; }
    #privy-root { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="privy-root"></div>
  <script type="module">
    /**
     * Chimera Privy Relay — loaded inside an iframe on new.localchimera.com
     *
     * This page runs the Privy auth flow inside an iframe whose origin is
     * new.localchimera.com (in Privy's allowed origins). Third-party apps
     * load this iframe via the @chimera/sdk and communicate via postMessage.
     *
     * Supported message types:
     *   - "login"      → triggers Privy login (social/embedded)
     *   - "logout"     → triggers Privy logout
     *   - "get-user"   → returns current auth state + wallet address
     */

    import { PrivyProvider, usePrivy, createRoot } from 'https://esm.sh/@privy-io/react-auth@2';
    import React, { useState, useEffect, useCallback } from 'https://esm.sh/react@18';
    import { createRoot as createReactRoot } from 'https://esm.sh/react-dom@18/client';

    const PRIVY_APP_ID = 'cmqu05m41000h0djl70k738mx';
    const PARENT_ORIGIN = '*'; // Accept from any parent — the SDK validates origin

    // Pending request queue (parent sends a message, we respond)
    const pending = new Map();

    // Relay component — runs inside PrivyProvider, handles messages
    function RelayApp() {
      const { ready, authenticated, user, login, logout } = usePrivy();
      const [initialized, setInitialized] = useState(false);

      // Notify parent that relay is ready
      useEffect(() => {
        if (ready) {
          window.parent.postMessage({ type: 'relay-ready' }, PARENT_ORIGIN);
          setInitialized(true);
        }
      }, [ready]);

      // Listen for messages from parent
      useEffect(() => {
        const handler = async (event) => {
          const { id, type, data } = event.data || {};
          if (!id || !type) return;

          try {
            let result;
            switch (type) {
              case 'login':
                await login();
                result = {
                  authenticated: true,
                  walletAddress: user?.wallet?.address || null,
                };
                break;
              case 'logout':
                await logout();
                result = { authenticated: false, walletAddress: null };
                break;
              case 'get-user':
                result = {
                  authenticated,
                  walletAddress: user?.wallet?.address || null,
                  ready,
                };
                break;
              default:
                result = { error: `Unknown type: ${type}` };
            }
            window.parent.postMessage({ id, data: result }, PARENT_ORIGIN);
          } catch (err) {
            window.parent.postMessage({ id, data: { error: err.message } }, PARENT_ORIGIN);
          }
        };

        window.addEventListener('message', handler);
        return () => window.removeEventListener('message', handler);
      }, [authenticated, user, ready, login, logout]);

      return null;
    }

    // Render
    const root = createReactRoot(document.getElementById('privy-root'));
    root.render(
      React.createElement(PrivyProvider, {
        appId: PRIVY_APP_ID,
        config: {
          loginMethods: ['google', 'email', 'wallet'],
          embeddedWallets: {
            createWalletOnLogin: true,
            requireUserPasswordOnCreate: false,
          },
          appearance: {
            loginMethods: ['google', 'email', 'wallet'],
          },
        },
      }, React.createElement(RelayApp))
    );
  </script>
</body>
</html>
