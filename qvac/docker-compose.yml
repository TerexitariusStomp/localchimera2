version: '3.8'

services:
  qvac-chimera:
    build:
      context: ..
      dockerfile: qvac/Dockerfile
    container_name: qvac-chimera
    ports:
      - "3002:3002"
    volumes:
      - chimera-data:/app/llmwiki-data
      - openviking-data:/app/.openviking
    environment:
      - NODE_ENV=production
      - PORT=3002
      - OPENVIKING_URL=http://127.0.0.1:1933
      - OPENVIKING_API_KEY=chimera-local-dev-key
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3002/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  chimera-data:
    driver: local
  openviking-data:
    driver: local
